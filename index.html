<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <button id="theme-toggle" aria-label="Toggle theme">🌓</button>
        <h1>Lotto Number Generator</h1>
        <div class="lotto-numbers">
        </div>
        <button id="generate-btn">Generate Numbers</button>

        <hr class="divider">

        <div class="dinner-section">
            <h2>What's for Dinner? 🍕</h2>
            <div id="dinner-result" class="dinner-result">Click to get a recommendation!</div>
            <button id="dinner-btn">Recommend Dinner</button>
        </div>

        <hr class="divider">

        <div class="contact-section">
            <h2>Partnership Inquiry 🤝</h2>
            <form action="https://formspree.io/f/xykowvwa" method="POST" id="contact-form">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="Your Name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="_replyto" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" placeholder="How can we work together?" required></textarea>
                </div>
                <button type="submit" id="submit-btn">Send Inquiry</button>
            </form>
            <div id="form-status"></div>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
