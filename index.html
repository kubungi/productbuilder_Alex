    <title data-i18n="page_title">Lotto Number Generator</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="header-controls">
            <button id="lang-toggle" class="control-btn" aria-label="Toggle language">KO</button>
            <button id="theme-toggle" class="control-btn theme-toggle" aria-label="Toggle theme">
                <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            </button>
        </div>
        <h1 data-i18n="main_heading">Lotto Number Generator</h1>
        <div class="lotto-numbers">
        </div>
        <button id="generate-btn" data-i18n="generate_btn">Generate Numbers</button>

        <hr class="divider">

        <div class="dinner-section">
            <h2 data-i18n="dinner_heading">What's for Dinner? 🍕</h2>
            <div id="dinner-result" class="dinner-result" data-i18n="dinner_default">Click to get a recommendation!</div>
            <button id="dinner-btn" data-i18n="recommend_btn">Recommend Dinner</button>
        </div>

        <hr class="divider">

        <div class="contact-section">
            <h2 data-i18n="contact_heading">Partnership Inquiry 🤝</h2>
            <form action="https://formspree.io/f/xykowvwa" method="POST" id="contact-form">
                <div class="form-group">
                    <label for="name" data-i18n="label_name">Name</label>
                    <input type="text" id="name" name="name" placeholder="Your Name" data-i18n-placeholder="placeholder_name" required>
                </div>
                <div class="form-group">
                    <label for="email" data-i18n="label_email">Email</label>
                    <input type="email" id="email" name="_replyto" placeholder="your@email.com" data-i18n-placeholder="placeholder_email" required>
                </div>
                <div class="form-group">
                    <label for="message" data-i18n="label_message">Message</label>
                    <textarea id="message" name="message" placeholder="How can we work together?" data-i18n-placeholder="placeholder_message" required></textarea>
                </div>
                <button type="submit" id="submit-btn" data-i18n="submit_btn">Send Inquiry</button>
            </form>
            <div id="form-status"></div>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
