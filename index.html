<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <button id="theme-toggle" aria-label="Toggle theme">🌓</button>
        <h1>Lotto Number Generator</h1>
        <div class="lotto-numbers">
        </div>
        <button id="generate-btn">Generate Numbers</button>

        <hr class="divider">

        <div class="dinner-section">
            <h2>What's for Dinner? 🍕</h2>
            <div id="dinner-result" class="dinner-result">Click to get a recommendation!</div>
            <button id="dinner-btn">Recommend Dinner</button>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
